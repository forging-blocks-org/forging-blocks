name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Poetry
        uses: ./.github/actions/setup-poetry

      - name: Install git-cliff
        uses: ./.github/actions/install-git-cliff

      - name: Install dependencies
        run: poetry install --no-interaction --with dev

      - name: Run CI checks
        run: poetry run poe ci:check

      - name: Run tests
        run: poetry run poe test

      - name: Build and Validate Artifacts
        run: bash scripts/pipeline/validate_artifacts.sh

  validate-publish:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Poetry
        uses: ./.github/actions/setup-poetry

      - name: Install dependencies
        run: poetry install --no-interaction --with dev

      - name: Extract base version
        id: version
        run: echo "VERSION=$(poetry version -s)" >> "$GITHUB_OUTPUT"

      - name: Run validation script
        env:
          TEST_PYPI_TOKEN: ${{ secrets.TEST_PYPI_TOKEN }}
          PACKAGE_NAME: forging-blocks
          IMPORT_NAME: forging_blocks
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: bash scripts/pipeline/validate_publish.sh

      - name: Upload to TestPyPI
        if: env.SKIP_PUBLISH != 'true' && github.actor != 'nektos/act'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          user: __token__
          password: ${{ secrets.TEST_PYPI_TOKEN }}
