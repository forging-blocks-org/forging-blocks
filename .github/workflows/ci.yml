name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Poetry
        uses: ./.github/actions/setup-poetry

      - name: Install git-cliff
        uses: ./.github/actions/install-git-cliff

      - name: Install dependencies
        run: poetry install --no-interaction --with dev

      - name: Run CI checks
        run: poetry run poe ci:check

      - name: Run tests
        run: poetry run poe test

      - name: Build and Validate Artifacts
        run: bash scripts/pipeline/validate_artifacts.sh

  validate-publish:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Poetry
        uses: ./.github/actions/setup-poetry

      - name: Install dependencies
        run: poetry install --no-interaction --with dev

      - name: Run validation script (Build & Version Bump)
        run: |
          V=$(poetry version -s)
          export VERSION=$V
          export PACKAGE_NAME=forging-blocks
          export IMPORT_NAME=forging_blocks
          bash ./scripts/validate_publish.sh
        env:
          PUBLISH_VERSION: ${{ needs.test.outputs.VERSION || '0.3.13' }}

      - name: Upload to TestPyPI
        uses: pypa/gh-action-pypi-publish@v1
        with:
          repository-url: https://test.pypi.org/legacy/
          password: ${{ secrets.TEST_PYPI_TOKEN }}

      - name: Smoke Test (Install from TestPyPI)
        run: |
          sleep 10
          TMP_VENV=$(mktemp -d)
          python3 -m venv "$TMP_VENV"
          source "$TMP_VENV/bin/activate"

          V=$(poetry version -s)

          pip install --index-url https://test.pypi.org/simple/ \
                      --extra-index-url https://pypi.org/simple/ \
                      forging-blocks=="$V"

          python - <<EOF
          import forging_blocks
          from importlib.metadata import version
          v = version("forging-blocks")
          print(f"Detected Version: {v}")
          assert v == "$V"
          EOF
