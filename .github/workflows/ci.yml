name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    outputs:
      VERSION: ${{ steps.get-version.outputs.VERSION }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Lint Workflow Files (YAML)
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: .github/workflows/ .github/actions/
          strict: true

      - name: Lint Workflow Files (Actions)
        uses: raven-actions/actionlint@v2

      - name: Lint Shell Scripts
        run: shellcheck --external-sources scripts/pipeline/*.sh

      - name: Set up Poetry
        uses: ./.github/actions/setup-poetry

      - name: Install git-cliff
        uses: ./.github/actions/install-git-cliff

      - name: Install dependencies
        run: poetry install --no-interaction --with dev

      - name: Validate Pipeline Env Contracts
        run: poetry run python scripts/pipeline/validate_env_contracts.py

      - name: Run CI checks
        run: poetry run poe ci:check

      - name: Run tests
        run: poetry run poe test

      - name: Extract Version
        id: get-version
        run: echo "VERSION=$(poetry version -s)" >> "$GITHUB_OUTPUT"

      - name: Build and Validate Artifacts
        run: bash scripts/pipeline/validate_artifacts.sh

  validate-pypi-tokens:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Verify OIDC token is available
        run: |
          TOKEN=$(curl --silent --fail \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=pypi" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['value'][:10])")
          if [ -z "$TOKEN" ]; then
            echo "OIDC token request failed" >&2
            exit 1
          fi
          echo "OIDC token available"

  validate-publish:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'
    permissions:
      id-token: write
    env:
      PACKAGE_NAME: forging-blocks
      IMPORT_NAME: forging_blocks

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Poetry
        uses: ./.github/actions/setup-poetry

      - name: Install dependencies (including twine)
        run: |
          poetry install --no-interaction --with dev
          pip install twine

      - name: Run validation script
        id: validate
        env:
          PACKAGE_NAME: "forging-blocks"
          IMPORT_NAME: "forging_blocks"
          VERSION: "${{ needs.test.outputs.VERSION }}"
        run: |
          chmod +x ./scripts/pipeline/validate_publish.sh
          ./scripts/pipeline/validate_publish.sh

      - name: Validate PUBLISH_VERSION
        env:
          PUBLISH_VERSION: "${{ env.PUBLISH_VERSION }}"
        run: bash scripts/pipeline/validate_publish_version.sh

      - name: Check if version already exists on TestPyPI
        id: testpypi-check
        env:
          PACKAGE_NAME: "${{ env.PACKAGE_NAME }}"
          PUBLISH_VERSION: "${{ env.PUBLISH_VERSION }}"
        run: |
          chmod +x ./scripts/pipeline/check_testpypi.sh
          ./scripts/pipeline/check_testpypi.sh

      - name: Upload to TestPyPI
        if: steps.testpypi-check.outputs.already_exists == 'false'
        uses: pypa/gh-action-pypi-publish@v1.13.0
        with:
          repository-url: https://test.pypi.org/legacy/

      - name: Smoke Test (Install from TestPyPI)
        if: steps.testpypi-check.outputs.already_exists == 'false'
        env:
          PACKAGE_NAME: "${{ env.PACKAGE_NAME }}"
          IMPORT_NAME: "${{ env.IMPORT_NAME }}"
          PUBLISH_VERSION: "${{ env.PUBLISH_VERSION }}"
        run: |
          chmod +x ./scripts/pipeline/smoke_test.sh
          ./scripts/pipeline/smoke_test.sh
