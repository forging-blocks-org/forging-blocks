name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    outputs:
      VERSION: ${{ steps.get-version.outputs.VERSION }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Lint Workflow Files (YAML)
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: .github/workflows/
          strict: true

      - name: Lint Workflow Files (Actions)
        uses: raven-actions/actionlint@v2

      - name: Set up Poetry
        uses: ./.github/actions/setup-poetry

      - name: Install git-cliff
        uses: ./.github/actions/install-git-cliff

      - name: Install dependencies
        run: poetry install --no-interaction --with dev

      - name: Run CI checks
        run: poetry run poe ci:check

      - name: Run tests
        run: poetry run poe test

      - name: Extract Version
        id: get-version
        run: echo "VERSION=$(poetry version -s)" >> "$GITHUB_OUTPUT"

      - name: Build and Validate Artifacts
        run: bash scripts/pipeline/validate_artifacts.sh

  validate-publish:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'
    env:
      PACKAGE_NAME: forging-blocks
      IMPORT_NAME: forging_blocks

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Poetry
        uses: ./.github/actions/setup-poetry

      - name: Install dependencies (including twine)
        run: |
          poetry install --no-interaction --with dev
          pip install twine

      - name: Run validation script
        id: validate
        env:
          PACKAGE_NAME: "forging-blocks"
          IMPORT_NAME: "forging_blocks"
          VERSION: "${{ needs.test.outputs.VERSION }}"
        run: |
          chmod +x ./scripts/validate_publish.sh
          ./scripts/validate_publish.sh

      - name: Upload to TestPyPI
        uses: pypa/gh-action-pypi-publish@v1.13.0
        with:
          repository-url: https://test.pypi.org/legacy/
          password: "${{ secrets.TEST_PYPI_TOKEN }}"
          skip-existing: true

      - name: Smoke Test (Install from TestPyPI)
        run: |
          sleep 15
          TMP_VENV=$(mktemp -d)
          python3 -m venv "$TMP_VENV"
          source "$TMP_VENV/bin/activate"

          pip install --index-url https://test.pypi.org/simple/ \
                      --extra-index-url https://pypi.org/simple/ \
                      "${{ env.PACKAGE_NAME }}==${{ env.PUBLISH_VERSION }}"

          python - <<EOF
          import ${{ env.IMPORT_NAME }}
          from importlib.metadata import version
          v = version("${{ env.PACKAGE_NAME }}")
          print(f"Detected Version: {v}")
          assert v == "${{ env.PUBLISH_VERSION }}"
          EOF
