name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Poetry
        uses: ./.github/actions/setup-poetry

      - name: Install git-cliff
        uses: ./.github/actions/install-git-cliff

      - name: Install dependencies
        run: poetry install --no-interaction --with dev

      - name: Run CI checks
        run: poetry run poe ci:check

      - name: Run tests
        run: poetry run poe test

      - name: Build package
        run: poetry build

      - name: Validate artifacts
        run: |
          pip install twine
          twine check dist/*

  validate-publish:
    runs-on: ubuntu-latest
    needs: test

    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Poetry
        uses: ./.github/actions/setup-poetry

      - name: Install dependencies
        run: poetry install --no-interaction --with dev

      - name: Configure TestPyPI repository
        run: poetry config repositories.testpypi https://test.pypi.org/legacy/

      - name: Extract version
        id: version
        run: echo "VERSION=$(poetry version -s)" >> $GITHUB_OUTPUT

      - name: Validate publish to TestPyPI
        env:
          TEST_PYPI_TOKEN: ${{ secrets.TEST_PYPI_TOKEN }}
          PACKAGE_NAME: forging-blocks
          IMPORT_NAME: forging_blocks
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          chmod +x scripts/validate_publish.sh
          scripts/validate_publish.sh
