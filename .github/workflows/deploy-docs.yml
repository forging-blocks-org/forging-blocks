name: Deploy Documentation

on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      version:
        description: "Documentation version to deploy (e.g., '0.4.1', 'dev')"
        required: true
        type: string
      dry-run:
        description: "Build and commit locally, do not push to gh-pages"
        required: false
        type: boolean
        default: false

concurrency:
  group: gh-pages
  cancel-in-progress: false  # Never cancel a running gh-pages deploy

permissions:
  contents: write

jobs:
  deploy-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fetch gh-pages branch
        shell: bash
        run: |
          if git ls-remote --exit-code origin gh-pages > /dev/null 2>&1; then
            git fetch origin gh-pages:gh-pages
          fi

      - name: Deploy documentation
        uses: ./.github/actions/deploy-docs
        with:
          version: ${{ github.event.inputs.version || 'dev' }}
          dry-run: ${{ github.event.inputs.dry-run || 'false' }}
          author-name: "forging-blocks"
          author-email: "forging-blocks-org@proton.me"
