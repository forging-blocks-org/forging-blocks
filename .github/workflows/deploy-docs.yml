name: Deploy Documentation

on:
  push:
    branches: ["main"]

permissions:
  contents: write

jobs:
  deploy-docs:
    concurrency: docs-deploy
    runs-on: ubuntu-latest
    env:
      GIT_AUTHOR_NAME: "automation[bot]"
      GIT_AUTHOR_EMAIL: "automation[bot]@users.noreply.github.com"
      GIT_COMMITTER_NAME: "automation[bot]"
      GIT_COMMITTER_EMAIL: "automation[bot]@users.noreply.github.com"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Poetry environment
        uses: ./.github/actions/setup-poetry

      - name: Install dependencies
        run: poetry install --no-interaction --with docs

      - name: Generate documentation pages
        run: poetry run python scripts/generate_autodoc_pages.py

      - name: Prepare git metadata for local CI runs
        if: ${{ github.actor == 'nektos/act' }}
        run: |
          # If .git is a file (worktree pointer), move it aside then create a local repo for act runs.
          if [ ! -d .git ]; then
            if [ -f .git ]; then
              mv .git .git.orig || true
            fi
            git init
            git add -A || true
            git commit -m "temp" || true
          fi

      - name: Deploy documentation
        run: poetry run mike deploy --push dev
