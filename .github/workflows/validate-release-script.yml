name: Validate Release Script

on:
  pull_request:
    paths:
      - scripts/validate_release_remote.sh
      - tests/scripts/test_validate_release_remote.sh

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check dependencies
        run: |
          command -v bash && echo "✓ bash"
          command -v gh && echo "✓ gh"
          command -v jq && echo "✓ jq"

      - name: Run validation test suite
        run: bash tests/scripts/test_validate_release_remote.sh
