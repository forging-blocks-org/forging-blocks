name: Release Pipeline

on:
  pull_request:
    types: [closed]

permissions:
  contents: write

jobs:
  release:
    if: >
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'release/v')
    runs-on: ubuntu-latest
    environment: pypi

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare Release and Tagging
        id: prep
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          bash scripts/pipeline/prepare_release.sh

      - name: Validate Release Version
        run: |
          if [ -z "${{ steps.prep.outputs.version }}" ]; then
            echo "prepare_release.sh did not set version output" >&2
            exit 1
          fi

      - name: Set up Poetry
        uses: ./.github/actions/setup-poetry

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Build and validate artifacts
        run: bash scripts/pipeline/validate_artifacts.sh

      - name: Publish to PyPI
        if: github.actor != 'nektos/act'
        uses: pypa/gh-action-pypi-publish@v1.13.0
        with:
          user: __token__
          password: ${{ secrets.PYPI_TOKEN }}
