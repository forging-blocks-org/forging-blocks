name: Release Pipeline

on:
  pull_request:
    types: [closed]

permissions:
  contents: write

jobs:
  release:
    if: >
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'release/v')
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: write
      id-token: write
    outputs:
      version: ${{ steps.prep.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Prepare Release and Tagging
        id: prep
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: bash scripts/pipeline/prepare_release.sh

      - name: Validate Release Version
        env:
          RELEASE_VERSION: ${{ steps.prep.outputs.version }}
        run: bash scripts/pipeline/validate_release_version.sh

      - name: Set up Poetry
        uses: ./.github/actions/setup-poetry

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Build and validate artifacts
        run: bash scripts/pipeline/validate_artifacts.sh

      - name: Publish to PyPI
        if: github.actor != 'nektos/act'
        uses: pypa/gh-action-pypi-publish@v1.13.0

      - name: Create GitHub Release
        if: github.actor != 'nektos/act'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ steps.prep.outputs.version }}
        run: bash scripts/pipeline/create_github_release.sh

  deploy-docs:
    concurrency:
      group: gh-pages
      cancel-in-progress: false
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fetch gh-pages branch
        shell: bash
        run: |
          if git ls-remote --exit-code origin gh-pages > /dev/null 2>&1; then
            git fetch origin gh-pages:gh-pages
          fi

      - name: Deploy versioned documentation
        uses: ./.github/actions/deploy-docs
        with:
          version: ${{ needs.release.outputs.version }}
