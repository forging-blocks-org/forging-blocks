name: Release Pipeline

on:
  pull_request:
    types: [closed]

permissions:
  contents: write

jobs:
  release:
    if: >
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'main' &&
      startsWith(github.event.pull_request.head.ref, 'release/v')

    runs-on: ubuntu-latest

    environment: pypi

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare Release and Tagging
        id: vars
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: bash scripts/pipeline/prepare_release.sh

      - name: Set up Poetry
        uses: ./.github/actions/setup-poetry

      - name: Install git-cliff
        uses: ./.github/actions/install-git-cliff

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Validate release candidate
        run: poetry run poe ci:release

      - name: Build and validate artiffacts
        run: bash scripts/pipeline/validate_artifacts.sh

      - name: Publish to PyPI
        if: github.actor != 'nektos/act'
        uses: pypa/gh-action-pypi-publish@v1
        with:
          password: ${{ secrets.PYPI_TOKEN }}
