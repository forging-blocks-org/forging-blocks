name: Validate Release Pipeline

on:
  workflow_dispatch:
    inputs:
      release_branch:
        description: 'Release branch to validate (e.g., release/v0.3.14)'
        required: true
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.release_branch }}

      - name: Compute tag
        id: vars
        shell: bash
        run: |
          TAG="${{ github.event.inputs.release_branch }}"
          TAG="${TAG#release/}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Tag: $TAG"

      - name: Verify tag exists on remote
        shell: bash
        run: |
          TAG="${{ steps.vars.outputs.tag }}"
          if ! git ls-remote --tags origin "$TAG" | grep -q .; then
            echo "Tag $TAG not found on remote"
            exit 1
          fi
          echo "Tag $TAG verified on remote"

      - name: Install git-cliff
        uses: ./.github/actions/install-git-cliff

      - name: Set up Poetry
        uses: ./.github/actions/setup-poetry

      - name: Install dependencies
        run: poetry install --with dev,docs

      - name: Validate release candidate
        run: poetry run poe ci:release

      - name: Build package (validate only)
        run: poetry build

      - name: Verify package was built
        run: |
          ls -la dist/
          echo "Build verification complete - package created successfully"
