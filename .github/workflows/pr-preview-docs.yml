name: Deploy PR Preview Docs

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed

concurrency:
  group: ${{ github.event.action == 'closed' && 'gh-pages' || format('preview-{0}', github.ref) }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  build-and-deploy-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect docs changes
        id: docs-changed
        env:
          ACTION: ${{ github.event.action }}
          BASE_REF: ${{ github.base_ref }}
          HEAD_REF: ${{ github.head_ref }}
        run: |
          set -euo pipefail

          if [ "$ACTION" = "closed" ]; then
            build="false"
            do_deploy="true"
          else
            if ! git rev-parse "origin/$BASE_REF" >/dev/null 2>&1; then
              git fetch origin "$BASE_REF"
            fi

            MERGE_BASE=$(git merge-base "origin/$BASE_REF" HEAD)

            CHANGED_FILES=$(git diff --name-only "$MERGE_BASE..HEAD" || true)

            if echo "$CHANGED_FILES" \
                | grep -qE '^(docs/|mkdocs\.yml|pyproject\.toml)'; then
              build="true"
              do_deploy="true"
            else
              build="false"
              do_deploy="false"
            fi
          fi

          echo "build=$build" >> "$GITHUB_OUTPUT"
          echo "do-deploy=$do_deploy" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        if: steps.docs-changed.outputs.build == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Setup Poetry
        if: steps.docs-changed.outputs.build == 'true'
        uses: ./.github/actions/setup-poetry

      - name: Install documentation dependencies
        if: steps.docs-changed.outputs.build == 'true'
        run: |
          poetry install --no-interaction --with docs

      - name: Generate documentation pages
        if: steps.docs-changed.outputs.build == 'true'
        run: |
          poetry run python scripts/generate_autodoc_pages.py

      - name: Build documentation site
        if: steps.docs-changed.outputs.build == 'true'
        run: |
          poetry run mkdocs build --strict

      - name: Deploy PR preview
        if: steps.docs-changed.outputs.do-deploy == 'true' && github.event.action != 'closed'
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: ./site/
          preview-branch: gh-pages
          umbrella-dir: pr-preview
          action: auto
          comment: true
          qr-code: true
          wait-for-pages-deployment: false

      - name: Remove PR preview
        if: steps.docs-changed.outputs.do-deploy == 'true' && github.event.action == 'closed'
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: ./site/
          preview-branch: gh-pages
          umbrella-dir: pr-preview
          action: remove
          comment: false
          wait-for-pages-deployment: false
