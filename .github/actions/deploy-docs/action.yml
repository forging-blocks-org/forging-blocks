name: Deploy Docs
description: >-
  Build and deploy documentation using mike. Handles Poetry setup, autodoc
  generation, git configuration, and act runtime compatibility. Reusable across
  multiple workflows (e.g., post-release, scheduled deploys).

inputs:
  version:
    description: "Documentation version to deploy (e.g., 'dev', '0.4.0')"
    required: true
  dry-run:
    description: "Build and commit locally, do not push to gh-pages"
    required: false
    default: "false"
  skip-dependencies:
    description: "Skip poetry install if already done in workflow"
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Validate version input
      shell: bash
      run: |
        if [ -z "${{ inputs.version }}" ]; then
          echo "ERROR: version input is required and must not be empty" >&2
          exit 1
        fi
        echo "Deploying documentation version: ${{ inputs.version }}"

    - name: Prepare git for act runtime
      shell: bash
      run: |
        if [ ! -d .git ]; then
          if [ -f .git ]; then
            mv .git .git.orig || true
          fi
          git init
          git add -A || true
          git commit -m "temp: local repo for act" || true
        fi

    - name: Configure git
      uses: ./.github/actions/configure-git

    - name: Setup Poetry
      if: inputs.skip-dependencies == 'false'
      uses: ./.github/actions/setup-poetry

    - name: Install documentation dependencies
      if: inputs.skip-dependencies == 'false'
      shell: bash
      run: |
        poetry install --no-interaction --with docs

    - name: Enforce clean working tree
      shell: bash
      run: |
        if ! git diff --quiet --exit-code; then
          echo "ERROR: Working tree has uncommitted changes. Cannot proceed with deployment." >&2
          echo "Uncommitted files:" >&2
          git diff --name-only >&2
          exit 1
        fi

    - name: Deploy documentation
      shell: bash
      run: |
        ARGS="--ignore-remote-status"
        if [ "${{ inputs.dry-run }}" == "true" ]; then
          ARGS="$ARGS --dry-run"
        fi
        ./scripts/deploy_versioned_docs.sh "${{ inputs.version }}" $ARGS

    - name: Restore mkdocs.yml
      shell: bash
      run: |
        git checkout -- mkdocs.yml
