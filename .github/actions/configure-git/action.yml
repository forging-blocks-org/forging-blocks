name: Configure Git
description: >-
  Set global git user and committer configuration for automated commits.

runs:
  using: composite
  steps:
    - name: Configure git user
      shell: bash
      env:
        GIT_AUTHOR_NAME: "forging-blocks"
        GIT_AUTHOR_EMAIL: "forging-blocks-org@proton.me"
        GIT_COMMITTER_NAME: "forging-blocks"
        GIT_COMMITTER_EMAIL: "forging-blocks-org@proton.me"
      run: |
        git config --global user.name "$GIT_AUTHOR_NAME"
        git config --global user.email "$GIT_AUTHOR_EMAIL"
        echo "Git configured: $GIT_AUTHOR_NAME <$GIT_AUTHOR_EMAIL>"
