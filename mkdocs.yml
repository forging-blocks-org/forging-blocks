plugins:
  - search
  - autorefs
  - section-index
  - mike:
      alias_type: redirect
      version_selector: true
      redirect_template: docs/redirect_template.html
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            members_order: source
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            show_signature_annotations: true
