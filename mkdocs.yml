site_name: ForgingBlocks
site_description: Composable toolkit for clean, testable, and maintainable Python applications
site_author: ForgingBlocks Org
site_url: https://forging-blocks-org.github.io

repo_url: https://github.com/forging-blocks-org
repo_name: forging-blocks-org/forging-blocks
edit_uri: edit/main/docs/

extra_css:
  - assets/css/theme.css
  - assets/css/mermaid-theme.css

extra_javascript:
  - assets/js/version-dropdown.js
  - assets/js/mermaid-init.js

theme:
  name: material
  language: en
  palette:
    scheme: slate
    primary: orange
    accent: amber
  highlightjs: false
  logo: assets/logo.png
  favicon: assets/favicon.ico
  features:
    - navigation.tabs
    - navigation.instant
    - navigation.sections
    - toc.follow
    - content.code.copy
    - content.action.edit
    - content.tabs.link

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - nl2br
  - toc:
      permalink: true
  - pymdownx.snippets:
      base_path: [., docs]
      check_paths: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
  - pymdownx.highlight:
      use_pygments: true
      pygments_style: gruvbox-dark
      noclasses: false
      pygments_lang_class: true
      anchor_linenums: true
      line_spans: __span

nav:
  - Home: index.md

  - Guide:
      - Introduction: guide/index.md
      - Getting Started: guide/getting-started.md
      - Testing: guide/testing.md
      - Example Tests: guide/example_tests.md
      - Examples: guide/examples.md
      - Principles: guide/principles.md
      - Architecture Overview: guide/architecture-overview.md
      - Recommended Blocks Structure: guide/recommended_blocks_structure.md

  - Reference:
      - Overview: reference/index.md
      - API Stability: reference/api-stability.md
      - Foundation:
          - Overview: reference/foundation.md
          - Result: reference/foundation/result.md
          - Ports: reference/foundation/ports.md
          - Errors: reference/foundation/errors.md
          - Messages: reference/foundation/messages.md
          - Value Objects: reference/foundation/value-objects.md
          - Auto-Freeze: reference/foundation/auto-freeze.md
          - Specifications: reference/foundation/specifications.md
          - Mappers: reference/foundation/mappers.md
          - Identified: reference/foundation/identified.md
          - Meta Utilities: reference/foundation/meta.md
          - Context: reference/foundation/context.md
          - Rules: reference/foundation/rules.md
      - Domain:
          - Overview: reference/domain.md
          - Entities: reference/domain/entities.md
          - Value Objects: reference/domain/value-objects.md
          - Aggregate Roots: reference/domain/aggregates.md
          - Specifications: reference/domain/specifications.md
          - Validators: reference/domain/validators.md
          - Permissions: reference/domain/permissions.md
          - Errors: reference/domain/errors.md
      - Application:
          - Overview: reference/application.md
          - Use Cases & Handlers: reference/application/use-cases.md
          - Ports: reference/application/ports.md
          - Errors: reference/application/errors.md
      - Infrastructure:
          - Overview: reference/infrastructure.md
          - Persistence: reference/infrastructure/persistence.md
          - Messaging: reference/infrastructure/messaging.md
          - Adapters: reference/infrastructure/adapters.md
      - Presentation:
          - Overview: reference/presentation.md
          - Adapters: reference/presentation/adapters.md
          - Error Handling: reference/presentation/error-handling.md
          - Middleware: reference/presentation/middleware.md
  - Architectural Styles:
      - Overview: architectural-styles/index.md
      - Clean Architecture: architectural-styles/clean-architecture.md
      - Hexagonal Architecture: architectural-styles/hexagonal-architecture.md
      - Layered Architecture: architectural-styles/layered-architecture.md
      - CQRS: architectural-styles/cqrs.md
      - Event-Driven: architectural-styles/event-driven.md

  - Contributing:
      - Overview: contributing/index.md
      - Contribution Guide: contributing/contributing.md
      - Docs Conventions: contributing/docs-conventions.md
      - Release Guide: contributing/release-guide.md

  - License: LICENSE.md

plugins:
  - search
  - autorefs
  - section-index
  - mike:
      alias_type: redirect
      version_selector: true
      redirect_template: docs/redirect_template.html
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            members_order: source
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            show_signature_annotations: true
