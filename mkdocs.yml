site_name: ForgingBlocks
site_description: Composable toolkit for clean, testable, and maintainable Python applications
site_author: ForgingBlocks Org
site_url: https://forging-blocks-org.github.io

repo_url: https://github.com/forging-blocks-org
repo_name: forging-blocks-org/forging-blocks
edit_uri: edit/main/docs/

extra_css:
  - assets/css/theme.css
  - assets/css/mermaid-theme.css

extra_javascript:
  - assets/js/version-dropdown.js
  - assets/js/mermaid-init.js

theme:
  name: material
  language: en
  palette:
    scheme: slate
    primary: orange
    accent: amber
  highlightjs: false
  logo: assets/logo.png
  favicon: assets/favicon.ico
  features:
    - navigation.tabs
    - navigation.instant
    - navigation.sections
    - toc.follow
    - content.code.copy
    - content.action.edit
    - content.tabs.link

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - nl2br
  - toc:
      permalink: true
  - pymdownx.snippets:
      base_path: [., docs]
      check_paths: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
  - pymdownx.highlight:
      use_pygments: true
      pygments_style: gruvbox-dark
      noclasses: false
      pygments_lang_class: true
      anchor_linenums: true
      line_spans: __span

